        }
    }

    # ─── Default: landing page ───
    server {
        listen 80 default_server;
        server_name _;

        location / {
            return 200 '{"services":["facturepro.localhost","schoolflow.localhost","savanaflow.localhost"],"mailhog":"http://localhost:8025"}';
            add_header Content-Type application/json;
        }
    }
}
