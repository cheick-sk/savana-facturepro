events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ─── FacturePro Africa ───
    server {
        listen 80;
        server_name facturepro.localhost;

        location /api/ {
            proxy_pass http://facturepro_backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 90s;
        }

        location / {
            proxy_pass http://facturepro_frontend:80/;
            proxy_set_header Host $host;
        }
    }

    # ─── SchoolFlow Africa ───
    server {
        listen 80;
        server_name schoolflow.localhost;

        location /api/ {
            proxy_pass http://schoolflow_backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 90s;
        }

        location / {
            proxy_pass http://schoolflow_frontend:80/;
            proxy_set_header Host $host;
        }
    }

    # ─── SavanaFlow POS ───
    server {
        listen 80;
        server_name savanaflow.localhost;

        location /api/ {
            proxy_pass http://savanaflow_backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 90s;
        }

        location / {
            proxy_pass http://savanaflow_frontend:80/;
            proxy_set_header Host $host;
        }
    }

    # ─── Default: landing page ───
    server {
        listen 80 default_server;
        server_name _;

        location / {
            return 200 '{"services":["facturepro.localhost","schoolflow.localhost","savanaflow.localhost"],"mailhog":"http://localhost:8025"}';
            add_header Content-Type application/json;
        }
    }
}
