# ═══════════════════════════════════════════════════════════════════════════════
# NGINX CONFIGURATION - FACTUREPRO AFRICA & SAVANAFLOW
# Production-ready with security headers, rate limiting, and HTTPS
# ═══════════════════════════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── LOGGING ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ─── PERFORMANCE ────────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # ─── GZIP COMPRESSION ───────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ─── RATE LIMITING ──────────────────────────────────────────────────────────
    # General rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    # API rate limiting (more restrictive)
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    # Auth rate limiting (very restrictive to prevent brute force)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    # Login specific
    limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

    # ─── SSL CONFIGURATION ──────────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ─── SECURITY HEADERS ───────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ─── UPSTREAM DEFINITIONS ───────────────────────────────────────────────────
    upstream facturepro_backend {
        server facturepro_backend:8000;
        keepalive 32;
    }

    upstream savanaflow_backend {
        server savanaflow_backend:8000;
        keepalive 32;
    }

    upstream facturepro_frontend {
        server facturepro_frontend:80;
        keepalive 16;
    }

    upstream savanaflow_frontend {
        server savanaflow_frontend:80;
        keepalive 16;
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # FACTUREPRO AFRICA
    # ═══════════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name facturepro.yourdomain.africa;
        
        # Redirect HTTP to HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }

        # ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }

    server {
        listen 443 ssl http2;
        server_name facturepro.yourdomain.africa;

        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/facturepro.yourdomain.africa/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/facturepro.yourdomain.africa/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/facturepro.yourdomain.africa/chain.pem;

        # HSTS (6 months)
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload" always;

        # Content Security Policy
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self';" always;

        # API proxy
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            
            proxy_pass http://facturepro_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Don't cache API responses
            proxy_buffering off;
        }

        # Auth endpoints (stricter rate limiting)
        location /api/v1/auth/login {
            limit_req zone=login burst=5 nodelay;
            
            proxy_pass http://facturepro_backend/api/v1/auth/login;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location /api/v1/auth/register {
            limit_req zone=auth burst=3 nodelay;
            
            proxy_pass http://facturepro_backend/api/v1/auth/register;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Health check (no rate limiting)
        location /health {
            proxy_pass http://facturepro_backend/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;
        }

        # Frontend
        location / {
            limit_req zone=general burst=20 nodelay;
            
            proxy_pass http://facturepro_frontend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Static assets caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://facturepro_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            
            access_log off;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # SAVANAFLOW POS
    # ═══════════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name savanaflow.yourdomain.africa;
        
        # Redirect HTTP to HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }

        # ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }

    server {
        listen 443 ssl http2;
        server_name savanaflow.yourdomain.africa;

        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/savanaflow.yourdomain.africa/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/savanaflow.yourdomain.africa/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/savanaflow.yourdomain.africa/chain.pem;

        # HSTS (6 months)
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload" always;

        # Content Security Policy
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self';" always;

        # API proxy
        location /api/ {
