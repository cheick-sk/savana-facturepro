# Nginx configuration with dynamic DNS resolution for Docker
# This fixes the "host not found in upstream" error when backend containers are restarting

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Docker DNS resolver - critical for dynamic container resolution
    # Using Docker's internal DNS server at 127.0.0.11
    # valid=10s means DNS cache is valid for 10 seconds, allowing container IP changes
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ─── FacturePro Africa ───
    server {
        listen 80;
        server_name facturepro.localhost;

        # Use variable for dynamic DNS resolution
        # This prevents startup failure if backend is not yet available
        set $backend_upstream "http://facturepro_backend:8000";
        set $frontend_upstream "http://facturepro_frontend:80";

        location /api/ {
            proxy_pass $backend_upstream/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 90s;
            proxy_connect_timeout 10s;
            
            # Error handling for unavailable backend
            proxy_intercept_errors on;
            error_page 502 503 504 = @backend_error;
        }

        location / {
            proxy_pass $frontend_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Error handling for unavailable frontend
            proxy_intercept_errors on;
            error_page 502 503 504 = @frontend_error;
        }

        location @backend_error {
            default_type application/json;
            return 503 '{"error": "FacturePro backend is starting up, please wait...","service": "facturepro_backend"}';
        }

        location @frontend_error {
            default_type application/json;
            return 503 '{"error": "FacturePro frontend is starting up, please wait...","service": "facturepro_frontend"}';
        }
    }

