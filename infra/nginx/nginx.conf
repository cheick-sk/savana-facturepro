            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            proxy_buffering off;
        }

        # Auth endpoints (stricter rate limiting)
        location /api/v1/auth/login {
            limit_req zone=login burst=5 nodelay;
            
            proxy_pass http://savanaflow_backend/api/v1/auth/login;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Health check
        location /health {
            proxy_pass http://savanaflow_backend/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;
        }

        # Frontend
        location / {
            limit_req zone=general burst=20 nodelay;
            
            proxy_pass http://savanaflow_frontend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Static assets caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://savanaflow_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            
            access_log off;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # DEFAULT SERVER - Landing / API Info
    # ═══════════════════════════════════════════════════════════════════════════
    server {
        listen 80 default_server;
        server_name _;

        # ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 200 '{
                "services": {
                    "facturepro": "https://facturepro.yourdomain.africa",
                    "savanaflow": "https://savanaflow.yourdomain.africa"
                },
                "documentation": "https://docs.yourdomain.africa",
                "support": "support@yourdomain.africa"
            }';
            add_header Content-Type application/json;
        }

        # Block all other requests
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
