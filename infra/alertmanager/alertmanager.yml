# Alertmanager configuration for Africa SaaS Platform
# Handles alert routing, grouping, and notifications

global:
  # SMTP configuration for email alerts
  smtp_smarthost: 'mailhog:1025'
  smtp_from: 'alerts@facturepro.africa'
  smtp_require_tls: false

  # Slack configuration (uncomment and configure)
  # slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'

  # Default resolve timeout
  resolve_timeout: 5m

# Templates
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Inhibition rules
inhibit_rules:
  # If critical alert is firing, inhibit warning alerts for same service
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['alertname', 'instance']

# Route tree
route:
  # Default receiver
  receiver: 'default-receiver'
  
  # Group alerts by these labels
  group_by: ['alertname', 'severity', 'application']
  
  # Wait time before sending initial notification
  group_wait: 30s
  
  # Wait time before sending updated notification
  group_interval: 5m
  
  # Wait time before resending notification
  repeat_interval: 4h
  
  # Child routes
  routes:
    # Critical alerts - immediate notification
    - matchers:
        - severity="critical"
      receiver: 'critical-alerts'
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # Database alerts
    - matchers:
        - component="database"
      receiver: 'database-alerts'
      group_by: ['alertname', 'database']

    # Payment system alerts - high priority
    - matchers:
        - component="payment"
      receiver: 'payment-alerts'
      group_wait: 10s
      repeat_interval: 30m

    # Business metric alerts
    - matchers:
        - component="business"
      receiver: 'business-alerts'
      group_wait: 5m

# Receivers
receivers:
  - name: 'default-receiver'
    email_configs:
      - to: 'admin@facturepro.africa'
        send_resolved: true
        headers:
          Subject: '[Africa SaaS] {{ .Status | toUpper }}: {{ .GroupLabels.alertname }}'

  - name: 'critical-alerts'
    email_configs:
      - to: 'admin@facturepro.africa'
        send_resolved: true
        headers:
          Subject: '[CRITICAL] Africa SaaS Alert: {{ .GroupLabels.alertname }}'
    # Slack notification (uncomment to enable)
    # slack_configs:
    #   - channel: '#critical-alerts'
    #     send_resolved: true
    #     title: 'Critical Alert: {{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

  - name: 'database-alerts'
    email_configs:
      - to: 'dba@facturepro.africa'
        send_resolved: true
        headers:
          Subject: '[Database] {{ .Status | toUpper }}: {{ .GroupLabels.alertname }}'

  - name: 'payment-alerts'
    email_configs:
      - to: 'payments@facturepro.africa'
        send_resolved: true
        headers:
          Subject: '[Payment] {{ .Status | toUpper }}: {{ .GroupLabels.alertname }}'

  - name: 'business-alerts'
    email_configs:
      - to: 'business@facturepro.africa'
        send_resolved: true
        headers:
          Subject: '[Business] {{ .Status | toUpper }}: {{ .GroupLabels.alertname }}'
