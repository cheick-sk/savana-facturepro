# Grafana Datasources Configuration
apiVersion: 1

datasources:
  # Prometheus - Primary metrics datasource
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus
    version: 1

  # PostgreSQL - FacturePro (for ad-hoc queries)
  - name: PostgreSQL-FacturePro
    type: postgres
    access: proxy
    url: postgres_facturepro:5432
    database: facturepro
    user: facturepro_user
    secureJsonData:
      password: facturepro_pass
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1500
    editable: false

  # PostgreSQL - SchoolFlow
  - name: PostgreSQL-SchoolFlow
    type: postgres
    access: proxy
    url: postgres_schoolflow:5432
    database: schoolflow
    user: schoolflow_user
    secureJsonData:
      password: schoolflow_pass
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1500
    editable: false

  # PostgreSQL - SavanaFlow
  - name: PostgreSQL-SavanaFlow
    type: postgres
    access: proxy
    url: postgres_savanaflow:5432
    database: savanaflow
    user: savanaflow_user
    secureJsonData:
      password: savanaflow_pass
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1500
    editable: false

  # Redis
  - name: Redis
    type: redis-datasource
    access: proxy
    url: redis://redis:6379
    jsonData:
      client: standalone
      poolSize: 5
      timeout: 10
    editable: false
