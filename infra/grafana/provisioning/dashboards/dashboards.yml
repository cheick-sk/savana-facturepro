# Grafana Dashboard Provisioning Configuration
apiVersion: 1

providers:
  - name: 'Africa SaaS Dashboards'
    orgId: 1
    folder: 'Africa SaaS'
    folderUid: 'africa-saas'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
