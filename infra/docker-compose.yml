# ═══════════════════════════════════════════════════════════════════════════════
# DOCKER COMPOSE - FACTUREPRO AFRICA & SAVANAFLOW
# Production-ready configuration with security best practices
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ─────────────── DATABASES ───────────────
  postgres_facturepro:
    image: postgres:15-alpine
    container_name: postgres_facturepro
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_FP_DB:-facturepro}
      POSTGRES_USER: ${POSTGRES_FP_USER:-facturepro_user}
      POSTGRES_PASSWORD: ${POSTGRES_FP_PASSWORD:-facturepro_dev_password}
    volumes:
      - pg_facturepro:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_FP_USER:-facturepro_user} -d ${POSTGRES_FP_DB:-facturepro}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - africa_saas_network

  postgres_savanaflow:
    image: postgres:15-alpine
    container_name: postgres_savanaflow
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_SF_DB:-savanaflow}
      POSTGRES_USER: ${POSTGRES_SF_USER:-savanaflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_SF_PASSWORD:-savanaflow_dev_password}
    volumes:
      - pg_savanaflow:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SF_USER:-savanaflow_user} -d ${POSTGRES_SF_DB:-savanaflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - africa_saas_network

  # ─────────────── REDIS ───────────────
  redis:
    image: redis:7-alpine
    container_name: redis_africa
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_password} --maxmemory 512mb --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - africa_saas_network

  # ─────────────── MAILHOG (Development only) ───────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    restart: unless-stopped
    profiles:
      - dev
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    logging:
      driver: "none"
    networks:
      - africa_saas_network

  # ─────────────── BACKENDS ───────────────
  facturepro_backend:
    build:
      context: ..
      dockerfile: apps/facturepro/backend/Dockerfile
    image: facturepro_backend:${IMAGE_TAG:-latest}
    container_name: facturepro_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_FP_USER:-facturepro_user}:${POSTGRES_FP_PASSWORD:-facturepro_dev_password}@postgres_facturepro:5432/${POSTGRES_FP_DB:-facturepro}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
      CELERY_BROKER: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      APP_ENV: ${APP_ENV:-development}
      PYTHONPATH: /app
    depends_on:
      postgres_facturepro:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - facturepro_uploads:/app/uploads
    working_dir: /app/apps/facturepro/backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          memory: 1G
    networks:
      - africa_saas_network

  savanaflow_backend:
    build:
      context: ..
      dockerfile: apps/savanaflow/backend/Dockerfile
    image: savanaflow_backend:${IMAGE_TAG:-latest}
    container_name: savanaflow_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_SF_USER:-savanaflow_user}:${POSTGRES_SF_PASSWORD:-savanaflow_dev_password}@postgres_savanaflow:5432/${POSTGRES_SF_DB:-savanaflow}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/1
      CELERY_BROKER: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/1
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      APP_ENV: ${APP_ENV:-development}
      PYTHONPATH: /app
    depends_on:
      postgres_savanaflow:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - savanaflow_uploads:/app/uploads
    working_dir: /app/apps/savanaflow/backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          memory: 1G
    networks:
      - africa_saas_network

  # ─────────────── CELERY WORKERS ───────────────
  facturepro_worker:
    build:
      context: ..
      dockerfile: apps/facturepro/backend/Dockerfile
    image: facturepro_backend:${IMAGE_TAG:-latest}
    container_name: facturepro_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_FP_USER:-facturepro_user}:${POSTGRES_FP_PASSWORD:-facturepro_dev_password}@postgres_facturepro:5432/${POSTGRES_FP_DB:-facturepro}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
      CELERY_BROKER: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      PYTHONPATH: /app
    working_dir: /app/apps/facturepro/backend
    command: python -m celery -A app.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      - redis
      - postgres_facturepro
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - africa_saas_network

  facturepro_beat:
    build:
      context: ..
      dockerfile: apps/facturepro/backend/Dockerfile
    image: facturepro_backend:${IMAGE_TAG:-latest}
    container_name: facturepro_beat
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
      CELERY_BROKER: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      PYTHONPATH: /app
    working_dir: /app/apps/facturepro/backend
    command: python -m celery -A app.celery_app beat --loglevel=info
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - africa_saas_network

  savanaflow_worker:
    build:
      context: ..
      dockerfile: apps/savanaflow/backend/Dockerfile
    image: savanaflow_backend:${IMAGE_TAG:-latest}
    container_name: savanaflow_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_SF_USER:-savanaflow_user}:${POSTGRES_SF_PASSWORD:-savanaflow_dev_password}@postgres_savanaflow:5432/${POSTGRES_SF_DB:-savanaflow}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/1
      CELERY_BROKER: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/1
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      PYTHONPATH: /app
    working_dir: /app/apps/savanaflow/backend
    command: python -m celery -A app.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      - redis
      - postgres_savanaflow
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - africa_saas_network

  savanaflow_beat:
    build:
      context: ..
      dockerfile: apps/savanaflow/backend/Dockerfile
    image: savanaflow_backend:${IMAGE_TAG:-latest}
    container_name: savanaflow_beat
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/1
      CELERY_BROKER: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/1
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      PYTHONPATH: /app
    working_dir: /app/apps/savanaflow/backend
    command: python -m celery -A app.celery_app beat --loglevel=info
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - africa_saas_network

  # ─────────────── FRONTENDS ───────────────
  facturepro_frontend:
    build:
      context: ../apps/facturepro/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://${FACTUREPRO_DOMAIN:-facturepro.yourdomain.africa}
    image: facturepro_frontend:${IMAGE_TAG:-latest}
    container_name: facturepro_frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - facturepro_backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - africa_saas_network

  savanaflow_frontend:
    build:
      context: ../apps/savanaflow/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://${SAVANAFLOW_DOMAIN:-savanaflow.yourdomain.africa}
    image: savanaflow_frontend:${IMAGE_TAG:-latest}
    container_name: savanaflow_frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - savanaflow_backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - africa_saas_network

  # ─────────────── NGINX REVERSE PROXY ───────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - facturepro_frontend
      - savanaflow_frontend
      - facturepro_backend
      - savanaflow_backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - africa_saas_network

  # ─────────────── CERTBOT (Let's Encrypt) ───────────────
  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - africa_saas_network

volumes:
  pg_facturepro:
  pg_savanaflow:
  facturepro_uploads:
  savanaflow_uploads:
  redis_data:
  certbot_certs:
  certbot_www:

networks:
  africa_saas_network:
    driver: bridge
