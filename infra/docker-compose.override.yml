# ═══════════════════════════════════════════════════════════════════════════════
# DOCKER COMPOSE OVERRIDE - LOCAL DEVELOPMENT
# This file overrides settings for local development
# Usage: docker compose up -d (automatically loads docker-compose.override.yml)
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ─────────────── DATABASES - Expose ports for local dev ───────────────
  postgres_facturepro:
    ports:
      - "15432:5432"

  postgres_savanaflow:
    ports:
      - "15433:5432"

  # ─────────────── REDIS - Expose port for local dev ───────────────
  redis:
    ports:
      - "16379:6379"

  # ─────────────── NGINX - Development config (no SSL) ───────────────
  nginx:
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"

  # ─────────────── DISABLE CERTBOT IN DEV ───────────────
  certbot:
    deploy:
      replicas: 0

  # ─────────────── MAILHOG - Email testing ───────────────
  mailhog:
    profiles: []
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  # ─────────────── BACKENDS - Expose ports for local dev ───────────────
  facturepro_backend:
    ports:
      - "8001:8000"
    build:
      context: ..
      dockerfile: apps/facturepro/backend/Dockerfile
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://facturepro_user:facturepro_dev_password@postgres_facturepro:5432/facturepro
      - REDIS_URL=redis://:redis_dev_password@redis:6379/0
      - CELERY_BROKER=redis://:redis_dev_password@redis:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - CORS_ORIGINS=http://localhost:3001,http://localhost:8001,http://localhost

  savanaflow_backend:
    ports:
      - "8002:8000"
    build:
      context: ..
      dockerfile: apps/savanaflow/backend/Dockerfile
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://savanaflow_user:savanaflow_dev_password@postgres_savanaflow:5432/savanaflow
      - REDIS_URL=redis://:redis_dev_password@redis:6379/1
      - CELERY_BROKER=redis://:redis_dev_password@redis:6379/1
      - SECRET_KEY=dev-secret-key-change-in-production
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - CORS_ORIGINS=http://localhost:3002,http://localhost:8002,http://localhost

  # ─────────────── WORKERS - Same config as backends ───────────────
  facturepro_worker:
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://facturepro_user:facturepro_dev_password@postgres_facturepro:5432/facturepro
      - REDIS_URL=redis://:redis_dev_password@redis:6379/0
      - CELERY_BROKER=redis://:redis_dev_password@redis:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production

  facturepro_beat:
    environment:
      - APP_ENV=development
      - REDIS_URL=redis://:redis_dev_password@redis:6379/0
      - CELERY_BROKER=redis://:redis_dev_password@redis:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production

  savanaflow_worker:
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://savanaflow_user:savanaflow_dev_password@postgres_savanaflow:5432/savanaflow
      - REDIS_URL=redis://:redis_dev_password@redis:6379/1
      - CELERY_BROKER=redis://:redis_dev_password@redis:6379/1
      - SECRET_KEY=dev-secret-key-change-in-production

  savanaflow_beat:
    environment:
      - APP_ENV=development
      - REDIS_URL=redis://:redis_dev_password@redis:6379/1
      - CELERY_BROKER=redis://:redis_dev_password@redis:6379/1
      - SECRET_KEY=dev-secret-key-change-in-production

  # ─────────────── FRONTENDS - Expose ports for local dev ───────────────
  facturepro_frontend:
    ports:
      - "3001:80"
    build:
      context: ../apps/facturepro/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8001

  savanaflow_frontend:
    ports:
      - "3002:80"
    build:
      context: ../apps/savanaflow/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8002
