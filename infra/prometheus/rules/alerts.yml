# Prometheus Alerting Rules for Africa SaaS Platform
# These rules define conditions that trigger alerts

groups:
  # ─────────────────────────────────────────────────────────────────────────────
  # APPLICATION HEALTH ALERTS
  # ─────────────────────────────────────────────────────────────────────────────
  - name: application_health
    interval: 30s
    rules:
      - alert: ApplicationDown
        expr: up{job=~".*-backend"} == 0
        for: 1m
        labels:
          severity: critical
          component: application
        annotations:
          summary: "Application {{ $labels.job }} is down"
          description: "The application {{ $labels.instance }} has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          sum(rate(facturepro_http_requests_total{status_code=~"5.."}[5m])) 
          / sum(rate(facturepro_http_requests_total[5m])) * 100 > 5
        for: 5m
        labels:
          severity: critical
          component: application
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | printf \"%.2f\" }}% (threshold: 5%). Check application logs for details."

      - alert: ElevatedErrorRate
        expr: |
          sum(rate(facturepro_http_requests_total{status_code=~"5.."}[5m])) 
          / sum(rate(facturepro_http_requests_total[5m])) * 100 > 1
        for: 10m
        labels:
          severity: warning
          component: application
        annotations:
          summary: "Elevated error rate"
          description: "Error rate is {{ $value | printf \"%.2f\" }}% (threshold: 1%). Monitor closely."

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(facturepro_http_request_duration_seconds_bucket[5m])) by (le)) > 2
        for: 5m
        labels:
          severity: warning
          component: application
        annotations:
          summary: "High request latency"
          description: "P95 latency is {{ $value | printf \"%.2f\" }}s (threshold: 2s). Performance degradation detected."

      - alert: CriticalLatency
        expr: |
          histogram_quantile(0.95, sum(rate(facturepro_http_request_duration_seconds_bucket[5m])) by (le)) > 5
        for: 2m
        labels:
          severity: critical
          component: application
        annotations:
          summary: "Critical request latency"
          description: "P95 latency is {{ $value | printf \"%.2f\" }}s (threshold: 5s). Immediate attention required."

  # ─────────────────────────────────────────────────────────────────────────────
  # DATABASE ALERTS
  # ─────────────────────────────────────────────────────────────────────────────
  - name: database
    interval: 30s
    rules:
      - alert: DatabaseDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Database {{ $labels.database }} is down"
          description: "PostgreSQL database {{ $labels.database }} is unreachable."

      - alert: HighConnectionCount
        expr: |
          sum(facturepro_database_connections{pool_status="in_use"}) / 
          (sum(facturepro_database_connections{pool_status="in_use"}) + sum(facturepro_database_connections{pool_status="idle"})) > 0.8
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "High database connection usage"
          description: "Database connection pool is {{ $value | printf \"%.0f\" }}% utilized. Consider increasing pool size."

      - alert: DatabaseConnectionExhaustion
        expr: |
          sum(facturepro_database_connections{pool_status="in_use"}) / 
          (sum(facturepro_database_connections{pool_status="in_use"}) + sum(facturepro_database_connections{pool_status="idle"})) > 0.95
        for: 2m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Database connection pool exhausted"
          description: "Connection pool is {{ $value | printf \"%.0f\" }}% utilized. Immediate action required."

      - alert: SlowQueries
        expr: |
          histogram_quantile(0.95, sum(rate(facturepro_database_query_duration_seconds_bucket[5m])) by (le)) > 0.5
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Slow database queries detected"
          description: "P95 query duration is {{ $value | printf \"%.3f\" }}s. Consider query optimization."

      - alert: DatabaseErrors
        expr: increase(facturepro_database_errors_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Database errors detected"
          description: "{{ $value }} database errors in the last 5 minutes. Check logs for details."

  # ─────────────────────────────────────────────────────────────────────────────
  # REDIS/CACHE ALERTS
  # ─────────────────────────────────────────────────────────────────────────────
  - name: cache
    interval: 30s
    rules:
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
          component: cache
        annotations:
          summary: "Redis is down"
          description: "Redis server is unreachable. Cache operations failing."

      - alert: LowCacheHitRate
        expr: |
          sum(rate(facturepro_cache_operations_total{result="hit"}[5m])) 
          / sum(rate(facturepro_cache_operations_total{operation="get"}[5m])) * 100 < 50
        for: 10m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Low cache hit rate"
          description: "Cache hit rate is {{ $value | printf \"%.1f\" }}% (threshold: 50%). Review caching strategy."

      - alert: HighCacheLatency
        expr: |
          histogram_quantile(0.95, sum(rate(facturepro_cache_latency_seconds_bucket[5m])) by (le)) > 0.01
        for: 5m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "High cache latency"
          description: "P95 cache latency is {{ $value | printf \"%.4f\" }}s (threshold: 10ms). Check Redis performance."

  # ─────────────────────────────────────────────────────────────────────────────
  # CELERY/TASK QUEUE ALERTS
  # ─────────────────────────────────────────────────────────────────────────────
  - name: celery
    interval: 30s
    rules:
      - alert: CeleryQueueBacklog
        expr: sum(facturepro_celery_queue_length) > 1000
        for: 10m
        labels:
          severity: warning
          component: celery
        annotations:
          summary: "Celery queue backlog"
          description: "Celery queue has {{ $value }} pending tasks. Consider adding more workers."

      - alert: CeleryQueueCritical
        expr: sum(facturepro_celery_queue_length) > 5000
        for: 5m
        labels:
          severity: critical
          component: celery
        annotations:
          summary: "Critical Celery queue backlog"
          description: "Celery queue has {{ $value }} pending tasks. Immediate action required."

      - alert: HighTaskFailureRate
        expr: |
          sum(rate(facturepro_celery_tasks_total{status="failure"}[5m])) 
          / sum(rate(facturepro_celery_tasks_total[5m])) * 100 > 10
        for: 5m
        labels:
          severity: warning
          component: celery
        annotations:
          summary: "High task failure rate"
          description: "Celery task failure rate is {{ $value | printf \"%.1f\" }}% (threshold: 10%). Check task logs."

      - alert: SlowTasks
        expr: |
          histogram_quantile(0.95, sum(rate(facturepro_celery_task_duration_seconds_bucket[5m])) by (le)) > 60
        for: 10m
        labels:
          severity: warning
          component: celery
        annotations:
          summary: "Slow Celery tasks detected"
          description: "P95 task duration is {{ $value | printf \"%.0f\" }}s (threshold: 60s). Review task optimization."

  # ─────────────────────────────────────────────────────────────────────────────
  # BUSINESS METRIC ALERTS
  # ─────────────────────────────────────────────────────────────────────────────
  - name: business
    interval: 1m
    rules:
      - alert: PaymentFailureSpike
        expr: |
          sum(rate(facturepro_payment_failures_total[5m])) > 
          sum(rate(facturepro_payment_failures_total[5m] offset 1h)) * 3
        for: 5m
        labels:
          severity: critical
          component: payment
        annotations:
          summary: "Payment failure spike detected"
          description: "Payment failures are 3x higher than 1 hour ago. Check payment provider status."

      - alert: HighPaymentFailureRate
        expr: |
          sum(rate(facturepro_payment_failures_total[5m])) 
          / (sum(rate(facturepro_payments_received_total[5m])) + sum(rate(facturepro_payment_failures_total[5m]))) * 100 > 20
        for: 10m
        labels:
          severity: critical
          component: payment
        annotations:
          summary: "High payment failure rate"
          description: "Payment failure rate is {{ $value | printf \"%.1f\" }}% (threshold: 20%). Revenue impact expected."

      - alert: NoPaymentsReceived
        expr: |
          sum(increase(facturepro_payments_received_total[1h])) == 0
          and hour() >= 8 and hour() <= 20
        for: 1h
        labels:
          severity: warning
          component: business
        annotations:
          summary: "No payments received in the last hour"
          description: "Zero payments processed during business hours. Check payment system status."

      - alert: SubscriptionChurnSpike
        expr: |
          sum(increase(facturepro_subscription_churns_total[1h])) > 5
        for: 5m
        labels:
          severity: warning
          component: business
        annotations:
          summary: "High subscription churn detected"
          description: "{{ $value }} subscriptions cancelled in the last hour. Review customer feedback."

      - alert: OverdueInvoicesAccumulating
        expr: |
          sum(facturepro_invoices_overdue) > 100
        for: 1h
        labels:
          severity: warning
          component: business
        annotations:
          summary: "High number of overdue invoices"
          description: "{{ $value }} overdue invoices. Consider sending payment reminders."

  # ─────────────────────────────────────────────────────────────────────────────
  # CONTAINER/INFRASTRUCTURE ALERTS
  # ─────────────────────────────────────────────────────────────────────────────
  - name: infrastructure
    interval: 30s
    rules:
      - alert: ContainerRestarting
        expr: |
          increase(container_restart_count[1h]) > 3
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "Container {{ $labels.name }} restarting frequently"
          description: "Container has restarted {{ $value }} times in the last hour. Check logs for crash reasons."

      - alert: HighContainerCPU
        expr: |
          rate(container_cpu_usage_seconds_total{name=~"facturepro.*|savanaflow.*|schoolflow.*"}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High CPU usage for {{ $labels.name }}"
          description: "Container CPU usage is {{ $value | printf \"%.1f\" }}% (threshold: 80%)."

      - alert: HighContainerMemory
        expr: |
          container_memory_working_set_bytes{name=~"facturepro.*|savanaflow.*|schoolflow.*"} 
          / container_spec_memory_limit_bytes{name=~"facturepro.*|savanaflow.*|schoolflow.*"} * 100 > 85
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High memory usage for {{ $labels.name }}"
          description: "Container memory usage is {{ $value | printf \"%.1f\" }}% (threshold: 85%)."

      - alert: ContainerMemoryCritical
        expr: |
          container_memory_working_set_bytes{name=~"facturepro.*|savanaflow.*|schoolflow.*"} 
          / container_spec_memory_limit_bytes{name=~"facturepro.*|savanaflow.*|schoolflow.*"} * 100 > 95
        for: 2m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "Critical memory usage for {{ $labels.name }}"
          description: "Container memory usage is {{ $value | printf \"%.1f\" }}% (threshold: 95%). OOM risk."
