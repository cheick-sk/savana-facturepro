# Prometheus configuration for Africa SaaS Platform
# Scrape configurations for all services

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  
  # External labels for federated Prometheus or remote storage
  external_labels:
    environment: 'production'
    platform: 'africa-saas'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Rule files
rule_files:
  - /etc/prometheus/rules/*.yml

# Scrape configurations
scrape_configs:
  # ─────────────────────────────────────────────────────────────────────────────
  # PROMETHEUS SELF-MONITORING
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics
    scheme: http

  # ─────────────────────────────────────────────────────────────────────────────
  # APPLICATION BACKENDS
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'facturepro-backend'
    static_configs:
      - targets: ['facturepro_backend:8000']
    metrics_path: /metrics
    scheme: http
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'facturepro'
      - source_labels: [__address__]
        target_label: application
        replacement: 'facturepro'

  - job_name: 'schoolflow-backend'
    static_configs:
      - targets: ['schoolflow_backend:8000']
    metrics_path: /metrics
    scheme: http
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'schoolflow'
      - source_labels: [__address__]
        target_label: application
        replacement: 'schoolflow'

  - job_name: 'savanaflow-backend'
    static_configs:
      - targets: ['savanaflow_backend:8000']
    metrics_path: /metrics
    scheme: http
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'savanaflow'
      - source_labels: [__address__]
        target_label: application
        replacement: 'savanaflow'

  # ─────────────────────────────────────────────────────────────────────────────
  # DATABASE EXPORTERS
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'postgres-facturepro'
    static_configs:
      - targets: ['postgres_exporter_facturepro:9187']
    relabel_configs:
      - source_labels: [__address__]
        target_label: database
        replacement: 'facturepro'
      - source_labels: [__address__]
        target_label: db_type
        replacement: 'postgresql'

  - job_name: 'postgres-schoolflow'
    static_configs:
      - targets: ['postgres_exporter_schoolflow:9187']
    relabel_configs:
      - source_labels: [__address__]
        target_label: database
        replacement: 'schoolflow'
      - source_labels: [__address__]
        target_label: db_type
        replacement: 'postgresql'

  - job_name: 'postgres-savanaflow'
    static_configs:
      - targets: ['postgres_exporter_savanaflow:9187']
    relabel_configs:
      - source_labels: [__address__]
        target_label: database
        replacement: 'savanaflow'
      - source_labels: [__address__]
        target_label: db_type
        replacement: 'postgresql'

  # ─────────────────────────────────────────────────────────────────────────────
  # REDIS EXPORTER
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: 'redis'

  # ─────────────────────────────────────────────────────────────────────────────
  # NODE EXPORTER (Host Metrics)
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node_exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: 'host'

  # ─────────────────────────────────────────────────────────────────────────────
  # cADVISOR (Container Metrics)
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: 'containers'

  # ─────────────────────────────────────────────────────────────────────────────
  # GRAFANA
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: /metrics

  # ─────────────────────────────────────────────────────────────────────────────
  # NGINX (if nginx-prometheus-exporter is added)
  # ─────────────────────────────────────────────────────────────────────────────
  # - job_name: 'nginx'
  #   static_configs:
  #     - targets: ['nginx_exporter:9113']

  # ─────────────────────────────────────────────────────────────────────────────
  # CELERY FLOWER (Task Queue Monitoring)
  # ─────────────────────────────────────────────────────────────────────────────
  # - job_name: 'flower'
  #   static_configs:
