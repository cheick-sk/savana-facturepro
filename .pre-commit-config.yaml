# Pre-commit configuration for Savana Africa SaaS
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

default_language_version:
  python: python3.11

repos:
  # ─────────────────────────────────────────────────────────────────────────────
  # General checks
  # ─────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
        args: [--unsafe]
        exclude: ^(apps/.*/frontend/|infra/kubernetes/)
      - id: check-json
        exclude: ^(apps/.*/frontend/|.vscode/)
      - id: check-toml
      - id: check-xml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key
      - id: detect-aws-credentials
        args: ['--allow-missing-credentials']
      - id: end-of-file-fixer
        exclude: ^(apps/.*/frontend/dist/|apps/.*/frontend/node_modules/)
      - id: trailing-whitespace
        args: ['--markdown-linebreak-ext=md']
        exclude: ^(apps/.*/frontend/dist/|apps/.*/frontend/node_modules/)
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: debug-statements
        languages: [python]

  # ─────────────────────────────────────────────────────────────────────────────
  # Python - Black (code formatter)
  # ─────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3.11
        args: ['--config', 'pyproject.toml']
        exclude: ^(migrations/|alembic/|node_modules/)

  # ─────────────────────────────────────────────────────────────────────────────
  # Python - isort (import sorting)
  # ─────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--settings-path', 'pyproject.toml']
        exclude: ^(migrations/|alembic/|node_modules/)

  # ─────────────────────────────────────────────────────────────────────────────
  # Python - Ruff (fast linter)
  # ─────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: ['--fix', '--exit-non-zero-on-fix']
        exclude: ^(migrations/|alembic/|node_modules/)

  # ─────────────────────────────────────────────────────────────────────────────
  # Python - Flake8 (style guide enforcement)
  # ─────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ['--config', '.flake8']
        exclude: ^(migrations/|alembic/|node_modules/|tests/fixtures/)

  # ─────────────────────────────────────────────────────────────────────────────
  # Python - Bandit (security linter)
  # ─────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml']
        additional_dependencies: ['bandit[toml]']
        exclude: ^(migrations/|alembic/|tests/|node_modules/)

  # ─────────────────────────────────────────────────────────────────────────────
  # Python - mypy (type checking)
  # ─────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: ['--config-file', 'pyproject.toml', '--ignore-missing-imports']
        additional_dependencies:
          - pydantic>=2.0.0
          - types-redis
          - types-requests
        exclude: ^(migrations/|alembic/|tests/|node_modules/)

  # ─────────────────────────────────────────────────────────────────────────────
  # Python - pip-audit (dependency security check)
  # ─────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/pypa/pip-audit
    rev: v2.7.3
    hooks:
      - id: pip-audit
        args: ['--skip-editable']
        files: requirements\.txt$
        pass_filenames: false

  # ─────────────────────────────────────────────────────────────────────────────
  # JavaScript/TypeScript - Prettier
  # ─────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, json, css, scss, markdown]
        exclude: ^(apps/.*/frontend/node_modules/|apps/.*/frontend/dist/|apps/.*/frontend/package-lock.json)

  # ─────────────────────────────────────────────────────────────────────────────
  # JavaScript/TypeScript - ESLint
  # ─────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.2.0
    hooks:
      - id: eslint
        types_or: [javascript, jsx, ts, tsx]
        files: ^apps/.*/frontend/src/
        exclude: ^(apps/.*/frontend/node_modules/|apps/.*/frontend/dist/)
        additional_dependencies:
          - eslint
          - '@typescript-eslint/eslint-plugin'
          - '@typescript-eslint/parser'
          - eslint-plugin-react
          - eslint-plugin-react-hooks

  # ─────────────────────────────────────────────────────────────────────────────
  # Docker - hadolint (Dockerfile linter)
  # ─────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        args: ['--ignore', 'DL3008', '--ignore', 'DL3009', '--ignore', 'DL3015']

  # ─────────────────────────────────────────────────────────────────────────────
  # Shell scripts - shellcheck
  # ─────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: ['--severity=warning']

  # ─────────────────────────────────────────────────────────────────────────────
  # GitHub Actions - actionlint
  # ─────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/rhysd/actionlint
    rev: v1.6.27
    hooks:
      - id: actionlint-docker
        args: ['-ignore', 'SC2086']

  # ─────────────────────────────────────────────────────────────────────────────
  # Secrets detection
  # ─────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: ^(package-lock\.json|poetry\.lock|Pipfile\.lock)$

# ─────────────────────────────────────────────────────────────────────────────
# CI configuration
# ─────────────────────────────────────────────────────────────────────────────
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
