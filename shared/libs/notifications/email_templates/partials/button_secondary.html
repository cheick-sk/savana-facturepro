<!-- Secondary Button (outlined style) -->
{% if button_url and button_text %}
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="margin: 20px 0;">
    <tr>
        <td align="{{ button_align | default('center') }}">
            <a href="{{ button_url }}" target="_blank" style="display: inline-block; background: #ffffff; color: #1a56db; font-size: 16px; font-weight: 600; text-decoration: none; padding: 13px 30px; border-radius: 8px; border: 2px solid #1a56db;">
                <!--[if mso]>
                <span style="padding: 13px 30px; display: inline-block;">
                <![endif]-->
                {{ button_text }}
                <!--[if mso]>
                </span>
                <![endif]-->
            </a>
        </td>
    </tr>
</table>
{% endif %}
