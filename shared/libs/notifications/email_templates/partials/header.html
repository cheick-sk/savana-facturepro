<!-- Email Header -->
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background: linear-gradient(135deg, #1a56db 0%, #3b82f6 100%); border-radius: 12px 12px 0 0;">
    <tr>
        <td style="padding: 25px 40px;">
            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                <tr>
                    <!-- Logo -->
                    <td align="left" valign="middle">
                        <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                            <tr>
                                <td style="vertical-align: middle;">
                                    <!-- Logo SVG inline for email compatibility -->
                                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="display: block;">
                                        <rect width="40" height="40" rx="8" fill="white" fill-opacity="0.2"/>
                                        <path d="M10 12h20v2H10v-2zm0 7h16v2H10v-2zm0 7h12v2H10v-2z" fill="white"/>
                                    </svg>
                                </td>
                                <td style="padding-left: 12px; vertical-align: middle;">
                                    <span style="font-size: 24px; font-weight: 700; color: #ffffff; letter-spacing: -0.5px;">
                                        {% if app_name %}{{ app_name }}{% else %}SAVANA{% endif %}
                                    </span>
                                </td>
                            </tr>
                        </table>
                    </td>
                    <!-- App badge -->
                    <td align="right" valign="middle">
                        <span style="display: inline-block; background: rgba(255,255,255,0.2); color: #ffffff; font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px;">
                            {% if app_module %}{{ app_module }}{% else %}Business Suite{% endif %}
                        </span>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
