<!-- Info Box (highlighted information) -->
{% if info_title or info_content %}
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="margin: 20px 0;">
    <tr>
        <td style="background-color: {{ bg_color | default('#eff6ff') }}; border-left: 4px solid {{ border_color | default('#1a56db') }}; border-radius: 0 8px 8px 0; padding: 16px 20px;">
            {% if info_title %}
            <p style="margin: 0 0 8px 0; font-size: 14px; font-weight: 600; color: {{ title_color | default('#1e40af') }};">
                {{ info_title }}
            </p>
            {% endif %}
            {% if info_content %}
            <p style="margin: 0; font-size: 14px; color: {{ text_color | default('#3730a3') }}; line-height: 1.6;">
                {{ info_content }}
            </p>
            {% endif %}
            {% if info_items %}
            <ul style="margin: 10px 0 0 0; padding-left: 20px; font-size: 14px; color: {{ text_color | default('#3730a3') }}; line-height: 1.8;">
                {% for item in info_items %}
                <li>{{ item }}</li>
                {% endfor %}
            </ul>
            {% endif %}
        </td>
    </tr>
</table>
{% endif %}
