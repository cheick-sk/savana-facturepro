<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SavanaFlow POS - Demo Multi-Devises & Scanner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    .animate-spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <div id="app"></div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // SYSTÈME MULTI-DEVISES - Franc Guinéen (GNF) par défaut
    // ═══════════════════════════════════════════════════════════════
    const CURRENCIES = [
      { code: 'GNF', name: 'Franc Guinéen', symbol: 'FG', flag: '🇬🇳', decimalPlaces: 0, isDefault: true },
      { code: 'XOF', name: 'Franc CFA (BCEAO)', symbol: 'CFA', flag: '🇸🇳', decimalPlaces: 0 },
      { code: 'XAF', name: 'Franc CFA (BEAC)', symbol: 'FCFA', flag: '🇨🇲', decimalPlaces: 0 },
      { code: 'EUR', name: 'Euro', symbol: '€', flag: '🇪🇺', decimalPlaces: 2 },
      { code: 'USD', name: 'Dollar US', symbol: '$', flag: '🇺🇸', decimalPlaces: 2 },
      { code: 'GBP', name: 'Livre Sterling', symbol: '£', flag: '🇬🇧', decimalPlaces: 2 },
    ];

    // Taux de change (par rapport au GNF)
    const EXCHANGE_RATES = {
      GNF: 1,
      XOF: 0.058,
      XAF: 0.058,
      EUR: 0.000088,
      USD: 0.000096,
      GBP: 0.000076,
    };

    const INVERSE_RATES = {
      GNF: 1,
      XOF: 17.24,
      XAF: 17.24,
      EUR: 11363.64,
      USD: 10416.67,
      GBP: 13157.89,
    };

    let activeCurrency = CURRENCIES[0];

    function formatCurrency(amount, currencyCode = 'GNF') {
      const currency = CURRENCIES.find(c => c.code === currencyCode) || CURRENCIES[0];
      if (currencyCode === 'GNF') {
        return `${currency.symbol} ${new Intl.NumberFormat('fr-GN').format(Math.round(amount))}`;
      }
      return new Intl.NumberFormat('fr-FR', {
        style: 'currency',
        currency: currencyCode,
        minimumFractionDigits: currency.decimalPlaces,
        maximumFractionDigits: currency.decimalPlaces
      }).format(amount);
    }

    function convertCurrency(amount, fromCurrency, toCurrency) {
      if (fromCurrency === toCurrency) return amount;
      const amountInGNF = fromCurrency === 'GNF' ? amount : amount * (INVERSE_RATES[fromCurrency] || 1);
      return toCurrency === 'GNF' ? amountInGNF : amountInGNF * (EXCHANGE_RATES[toCurrency] || 1);
    }

    // ═══════════════════════════════════════════════════════════════
    // GÉNÉRATION DE CODES-BARRES EAN-13 (Préfixe Guinée: 612-614)
    // ═══════════════════════════════════════════════════════════════
    function calculateEAN13Checksum(code) {
      if (code.length !== 12) code = code.padStart(12, '0').slice(0, 12);
      let sum = 0;
      for (let i = 0; i < 12; i++) {
        sum += parseInt(code[i]) * (i % 2 === 0 ? 1 : 3);
      }
      return ((10 - (sum % 10)) % 10).toString();
    }

    function generateEAN13(prefix = '612') {
      const randomDigits = Array.from({length: 9}, () => Math.floor(Math.random() * 10)).join('');
      const base = prefix + randomDigits;
      const checksum = calculateEAN13Checksum(base);
      return base + checksum;
    }

    function generateSKU(categoryCode = 'GEN') {
      const date = new Date();
      const yearCode = date.getFullYear().toString().slice(-2);
      const monthCode = (date.getMonth() + 1).toString().padStart(2, '0');
      const random = Math.floor(Math.random() * 9999).toString().padStart(4, '0');
      return `${categoryCode}-${yearCode}${monthCode}-${random}`;
    }

    // ═══════════════════════════════════════════════════════════════
    // DONNÉES PRODUITS
    // ═══════════════════════════════════════════════════════════════
    const products = [
      { id: 1, name: 'Riz Importé 5kg', barcode: generateEAN13('612'), sku: generateSKU('ALI'), category: 'Alimentation', sellPrice: 75000, stock: 150, unit: 'sac' },
      { id: 2, name: 'Huile Végétale 1L', barcode: generateEAN13('612'), sku: generateSKU('ALI'), category: 'Alimentation', sellPrice: 25000, stock: 80, unit: 'bouteille' },
      { id: 3, name: 'Sucre Blanc 1kg', barcode: generateEAN13('612'), sku: generateSKU('ALI'), category: 'Alimentation', sellPrice: 15000, stock: 200, unit: 'paquet' },
      { id: 4, name: 'Savon de Toilette', barcode: generateEAN13('612'), sku: generateSKU('HYG'), category: 'Hygiène', sellPrice: 8500, stock: 300, unit: 'pièce' },
      { id: 5, name: 'Pâte Dentifrice', barcode: generateEAN13('612'), sku: generateSKU('HYG'), category: 'Hygiène', sellPrice: 12000, stock: 120, unit: 'tube' },
      { id: 6, name: 'Café Torréfié 250g', barcode: generateEAN13('612'), sku: generateSKU('BOI'), category: 'Boissons', sellPrice: 35000, stock: 90, unit: 'paquet' },
      { id: 7, name: 'Thé Vert 100 sachets', barcode: generateEAN13('612'), sku: generateSKU('BOI'), category: 'Boissons', sellPrice: 18000, stock: 60, unit: 'boîte' },
      { id: 8, name: 'Lait Concentré', barcode: generateEAN13('612'), sku: generateSKU('ALI'), category: 'Alimentation', sellPrice: 9500, stock: 180, unit: 'boîte' },
      { id: 9, name: 'Eau Minérale 1.5L', barcode: generateEAN13('612'), sku: generateSKU('BOI'), category: 'Boissons', sellPrice: 5000, stock: 500, unit: 'bouteille' },
      { id: 10, name: 'Biscuits Assortis', barcode: generateEAN13('612'), sku: generateSKU('ALI'), category: 'Alimentation', sellPrice: 8500, stock: 95, unit: 'paquet' },
      { id: 11, name: 'Tomate Concentrée', barcode: generateEAN13('612'), sku: generateSKU('ALI'), category: 'Alimentation', sellPrice: 6500, stock: 220, unit: 'tube' },
      { id: 12, name: 'Pâtes Alimentaires 500g', barcode: generateEAN13('612'), sku: generateSKU('ALI'), category: 'Alimentation', sellPrice: 7500, stock: 175, unit: 'paquet' },
    ];

    // ═══════════════════════════════════════════════════════════════
    // ÉTAT DE L'APPLICATION
    // ═══════════════════════════════════════════════════════════════
    let cart = [];
    let discount = 0;
    let paymentMethod = 'CASH';
    let showScanner = false;
    let showCurrencySelector = false;
    let showExchangeCalculator = false;
    let showReceipt = false;
    let lastSale = null;
    let exchangeAmount = 100000;
    let exchangeFromCurrency = 'GNF';
    let exchangeToCurrency = 'EUR';

    // ═══════════════════════════════════════════════════════════════
    // FONCTIONS PANIER
    // ═══════════════════════════════════════════════════════════════
    function addToCart(product) {
      const existing = cart.find(i => i.id === product.id);
      if (existing) {
        existing.quantity++;
        existing.lineTotal = existing.quantity * existing.sellPrice;
      } else {
        cart.push({
          ...product,
          quantity: 1,
          lineTotal: product.sellPrice
        });
      }
      render();
    }

    function updateQuantity(productId, delta) {
      const item = cart.find(i => i.id === productId);
      if (item) {
        item.quantity += delta;
        if (item.quantity <= 0) {
          cart = cart.filter(i => i.id !== productId);
        } else {
          item.lineTotal = item.quantity * item.sellPrice;
        }
        render();
      }
    }

    function removeFromCart(productId) {
      cart = cart.filter(i => i.id !== productId);
      render();
    }

    function getCartTotal() {
      return cart.reduce((sum, item) => sum + item.lineTotal, 0);
    }

    function getCartTax() {
      return Math.round(getCartTotal() * 0.18); // TVA 18%
    }

    function getCartGrandTotal() {
      return getCartTotal() + getCartTax() - discount;
    }

    // ═══════════════════════════════════════════════════════════════
    // REÇU DE PAIEMENT
    // ═══════════════════════════════════════════════════════════════
    function generateReceiptNumber() {
      const date = new Date();
      const year = date.getFullYear().toString().slice(-2);
      const month = (date.getMonth() + 1).toString().padStart(2, '0');
      const day = date.getDate().toString().padStart(2, '0');
      const random = Math.floor(Math.random() * 9999).toString().padStart(4, '0');
      return `GN${year}${month}${day}-${random}`;
    }

    function processPayment() {
      if (cart.length === 0) return;
      
      lastSale = {
        receiptNumber: generateReceiptNumber(),
        date: new Date(),
        items: [...cart],
        subtotal: getCartTotal(),
        tax: getCartTax(),
        discount: discount,
        total: getCartGrandTotal(),
        paymentMethod: paymentMethod,
        currency: activeCurrency.code
      };
      
      showReceipt = true;
      cart = [];
      discount = 0;
      render();
    }

    // ═══════════════════════════════════════════════════════════════
    // SCANNER CODE-BARRES
    // ═══════════════════════════════════════════════════════════════
    function scanBarcode(code) {
      const product = products.find(p => p.barcode === code);
      if (product) {
        addToCart(product);
        showScanner = false;
      } else {
        alert('Produit non trouvé: ' + code);
      }
    }

    // ═══════════════════════════════════════════════════════════════
    // RENDU DE L'INTERFACE
    // ═══════════════════════════════════════════════════════════════
    function render() {
      const app = document.getElementById('app');
      
      app.innerHTML = `
        <div class="h-screen flex flex-col">
          <!-- Header -->
          <header class="bg-blue-600 text-white px-6 py-3 flex items-center justify-between shadow-lg">
            <div class="flex items-center gap-4">
              <h1 class="text-xl font-bold">🛒 SavanaFlow POS</h1>
              <span class="bg-blue-500 px-3 py-1 rounded-full text-sm">Guinée 🇬🇳</span>
            </div>
            <div class="flex items-center gap-3">
              <button onclick="showCurrencySelector = !showCurrencySelector; render()" 
                class="flex items-center gap-2 px-3 py-2 bg-blue-700 rounded-lg hover:bg-blue-800 transition">
                <span class="text-lg">${activeCurrency.flag}</span>
                <span>${activeCurrency.code}</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
              </button>
              <button onclick="showExchangeCalculator = !showExchangeCalculator; render()"
                class="flex items-center gap-2 px-3 py-2 bg-blue-700 rounded-lg hover:bg-blue-800 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
                </svg>
                <span>Convertir</span>
              </button>
            </div>
          </header>

          <!-- Main Content -->
          <div class="flex-1 flex overflow-hidden">
            <!-- Left: Products -->
            <div class="flex-1 flex flex-col p-4 overflow-hidden">
              <!-- Toolbar -->
              <div class="flex gap-3 mb-4">
                <input type="text" placeholder="🔍 Rechercher ou scanner code-barres..." 
                  class="flex-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                  id="searchInput">
                <button onclick="showScanner = true; render()" 
                  class="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/>
                  </svg>
                  Scanner
                </button>
              </div>

              <!-- Exchange Calculator -->
              ${showExchangeCalculator ? `
                <div class="bg-white rounded-xl p-4 mb-4 shadow-sm border">
                  <div class="flex items-center justify-between mb-3">
                    <h3 class="font-medium flex items-center gap-2">
                      <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                      </svg>
                      Convertisseur de devises
                    </h3>
                    <button onclick="showExchangeCalculator = false; render()" class="text-gray-400 hover:text-gray-600">✕</button>
                  </div>
                  <div class="flex items-end gap-3">
                    <div class="flex-1">
                      <label class="text-xs text-gray-500">Montant</label>
                      <input type="number" value="${exchangeAmount}" 
                        onchange="exchangeAmount = +this.value; render()"
                        class="w-full mt-1 px-3 py-2 border rounded-lg">
                    </div>
                    <div class="w-32">
                      <label class="text-xs text-gray-500">De</label>
                      <select onchange="exchangeFromCurrency = this.value; render()"
                        class="w-full mt-1 px-2 py-2 border rounded-lg">
                        ${CURRENCIES.map(c => `
                          <option value="${c.code}" ${c.code === exchangeFromCurrency ? 'selected' : ''}>${c.flag} ${c.code}</option>
                        `).join('')}
                      </select>
                    </div>
                    <div class="pb-2 text-gray-400">→</div>
                    <div class="w-32">
                      <label class="text-xs text-gray-500">Vers</label>
                      <select onchange="exchangeToCurrency = this.value; render()"
                        class="w-full mt-1 px-2 py-2 border rounded-lg">
                        ${CURRENCIES.map(c => `
                          <option value="${c.code}" ${c.code === exchangeToCurrency ? 'selected' : ''}>${c.flag} ${c.code}</option>
                        `).join('')}
                      </select>
                    </div>
                    <div class="flex-1 text-right">
                      <div class="text-2xl font-bold text-blue-600">
                        ${formatCurrency(convertCurrency(exchangeAmount, exchangeFromCurrency, exchangeToCurrency), exchangeToCurrency)}
                      </div>
                    </div>
                  </div>
                </div>
              ` : ''}

              <!-- Products Grid -->
              <div class="flex-1 overflow-auto grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 content-start">
                ${products.map(p => `
                  <button onclick='addToCart(${JSON.stringify(p).replace(/'/g, "\\'")})'
                    class="bg-white rounded-xl p-3 text-left border hover:shadow-md hover:border-blue-300 transition-all group">
                    <div class="flex items-start justify-between">
                      <div class="font-medium text-sm text-gray-900 line-clamp-2">${p.name}</div>
                      <svg class="w-4 h-4 text-gray-300 group-hover:text-blue-500 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/>
                      </svg>
                    </div>
                    <div class="text-xs text-gray-500 mt-1">${p.category}</div>
                    <div class="mt-2 font-semibold text-blue-600">${formatCurrency(p.sellPrice, activeCurrency.code)}</div>
                    <div class="text-xs text-gray-400 mt-1 flex items-center justify-between">
                      <span>Stock: ${p.stock} ${p.unit}</span>
                      <code class="text-xs bg-gray-100 px-1 rounded">${p.barcode.slice(-4)}</code>
                    </div>
                  </button>
                `).join('')}
              </div>
            </div>

            <!-- Right: Cart -->
            <div class="w-96 bg-white border-l flex flex-col">
              <!-- Cart Header -->
              <div class="px-4 py-3 border-b flex items-center justify-between">
                <h2 class="font-semibold">Panier (${cart.length} article${cart.length !== 1 ? 's' : ''})</h2>
                ${cart.length > 0 ? `
                  <button onclick="cart = []; render()" class="text-sm text-red-500 hover:underline">Vider</button>
                ` : ''}
              </div>

              <!-- Cart Items -->
              <div class="flex-1 overflow-auto">
                ${cart.length === 0 ? `
                  <div class="py-16 text-center text-gray-400">
                    <svg class="w-10 h-10 mx-auto mb-2 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                    </svg>
                    <p class="text-sm">Scannez ou cliquez sur un produit</p>
                  </div>
                ` : cart.map(item => `
                  <div class="px-4 py-3 border-b">
                    <div class="flex items-start justify-between gap-2">
                      <div class="flex-1 min-w-0">
                        <div class="font-medium text-sm truncate">${item.name}</div>
                        <code class="text-xs text-gray-400">${item.barcode}</code>
                      </div>
                      <button onclick="removeFromCart(${item.id})" class="text-gray-400 hover:text-red-500">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                      </button>
                    </div>
                    <div class="flex items-center justify-between mt-2">
                      <div class="flex items-center gap-2">
                        <button onclick="updateQuantity(${item.id}, -1)" 
                          class="w-7 h-7 rounded-lg border flex items-center justify-center hover:bg-gray-50">−</button>
                        <span class="w-8 text-center font-medium">${item.quantity}</span>
                        <button onclick="updateQuantity(${item.id}, 1)" 
                          class="w-7 h-7 rounded-lg border flex items-center justify-center hover:bg-gray-50">+</button>
                      </div>
                      <span class="font-medium">${formatCurrency(item.lineTotal, activeCurrency.code)}</span>
                    </div>
                  </div>
                `).join('')}
              </div>

              <!-- Cart Footer -->
              <div class="border-t p-4">
                <div class="space-y-2 text-sm">
                  <div class="flex justify-between text-gray-500">
                    <span>Sous-total</span>
                    <span>${formatCurrency(getCartTotal(), activeCurrency.code)}</span>
                  </div>
                  <div class="flex justify-between text-gray-500">
                    <span>TVA (18%)</span>
                    <span>${formatCurrency(getCartTax(), activeCurrency.code)}</span>
                  </div>
                  <div class="flex items-center justify-between">
                    <span class="text-gray-500">Remise</span>
                    <input type="number" value="${discount}" min="0" 
                      onchange="discount = +this.value; render()"
                      class="w-24 px-2 py-1 border rounded text-right text-sm">
                  </div>
                  <div class="flex justify-between text-lg font-bold pt-2 border-t">
                    <span>Total</span>
                    <span class="text-blue-600">${formatCurrency(getCartGrandTotal(), activeCurrency.code)}</span>
                  </div>
                </div>

                <!-- Payment Methods -->
                <div class="mt-4">
                  <div class="text-xs text-gray-500 mb-2">Mode de paiement</div>
                  <div class="grid grid-cols-3 gap-2">
                    ${[
                      { key: 'CASH', icon: '💵', label: 'Espèces' },
                      { key: 'MOBILE_MONEY', icon: '📱', label: 'Mobile' },
                      { key: 'CARD', icon: '💳', label: 'Carte' },
                    ].map(({ key, icon, label }) => `
                      <button onclick="paymentMethod = '${key}'; render()"
                        class="flex flex-col items-center gap-1 py-2 rounded-lg border transition-all
                          ${paymentMethod === key ? 'border-blue-500 bg-blue-50 text-blue-600' : 'hover:border-gray-300'}">
                        <span class="text-lg">${icon}</span>
                        <span class="text-xs">${label}</span>
                      </button>
                    `).join('')}
                  </div>
                </div>

                <!-- Pay Button -->
                <button onclick="processPayment()" 
                  disabled="${cart.length === 0}"
                  class="w-full mt-4 py-3 rounded-xl font-semibold flex items-center justify-center gap-2 transition-all
                    ${cart.length === 0 
                      ? 'bg-gray-100 text-gray-400 cursor-not-allowed' 
                      : 'bg-blue-600 text-white hover:bg-blue-700'}">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                  </svg>
                  Encaisser ${formatCurrency(getCartGrandTotal(), activeCurrency.code)}
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Currency Selector Modal -->
        ${showCurrencySelector ? `
          <div class="fixed inset-0 bg-black/50 flex items-start justify-end z-50">
            <div class="bg-white rounded-l-xl w-72 mt-14 mr-0 shadow-xl">
              <div class="p-3 border-b bg-gray-50 flex justify-between items-center">
                <span class="text-sm font-medium">Sélectionner une devise</span>
                <button onclick="showCurrencySelector = false; render()" class="text-gray-400 hover:text-gray-600">✕</button>
              </div>
              <div class="max-h-96 overflow-auto">
                ${CURRENCIES.map(c => `
                  <button onclick="activeCurrency = CURRENCIES.find(cur => cur.code === '${c.code}'); showCurrencySelector = false; render()"
                    class="w-full px-4 py-3 text-left hover:bg-gray-50 flex items-center gap-3
                      ${activeCurrency.code === c.code ? 'bg-blue-50 text-blue-600' : ''}">
                    <span class="text-xl">${c.flag}</span>
                    <span class="flex-1">${c.name}</span>
                    <span class="text-gray-400">${c.symbol}</span>
                    ${c.isDefault ? '<span class="text-xs bg-green-100 text-green-600 px-1 rounded">Défaut</span>' : ''}
                  </button>
                `).join('')}
              </div>
            </div>
          </div>
        ` : ''}

        <!-- Scanner Modal -->
        ${showScanner ? `
          <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
            <div class="bg-white rounded-xl w-full max-w-md p-6">
              <div class="flex items-center justify-between mb-4">
                <h3 class="font-semibold flex items-center gap-2">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/>
                  </svg>
                  Scanner un code-barres
                </h3>
                <button onclick="showScanner = false; render()" class="text-gray-400 hover:text-gray-600">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                  </svg>
                </button>
              </div>
              <div class="space-y-4">
                <input type="text" id="barcodeInput" placeholder="Entrez le code-barres ou scannez..."
                  class="w-full px-4 py-3 border rounded-lg text-lg font-mono"
                  onkeydown="if(event.key === 'Enter') scanBarcode(this.value)">
                <div class="bg-gray-50 rounded-lg p-4 text-center">
                  <div class="text-sm text-gray-500 mb-2">Exemples de codes-barres (cliquez pour tester):</div>
                  <div class="flex flex-wrap gap-2 justify-center">
                    ${products.slice(0, 4).map(p => `
                      <button onclick="document.getElementById('barcodeInput').value = '${p.barcode}'; scanBarcode('${p.barcode}')"
                        class="px-2 py-1 bg-white border rounded text-xs font-mono hover:bg-gray-100">
                        ${p.barcode}
                      </button>
                    `).join('')}
                  </div>
                </div>
                <button onclick="scanBarcode(document.getElementById('barcodeInput').value)"
                  class="w-full py-3 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700">
                  Ajouter au panier
                </button>
              </div>
            </div>
          </div>
        ` : ''}

        <!-- Receipt Modal -->
        ${showReceipt && lastSale ? `
          <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
            <div class="bg-white rounded-xl w-full max-w-sm max-h-[90vh] overflow-auto shadow-2xl">
              <div class="sticky top-0 bg-white border-b px-4 py-3 flex items-center justify-between">
                <h3 class="font-semibold">🧾 Reçu de paiement</h3>
                <button onclick="showReceipt = false; render()" class="text-gray-400 hover:text-gray-600">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                  </svg>
                </button>
              </div>
              <div class="p-4">
                <!-- Header -->
                <div class="text-center border-b pb-4 mb-4">
                  <div class="text-lg font-bold">SavanaFlow Store</div>
                  <div class="text-sm text-gray-500">Conakry, Guinée</div>
                  <div class="text-sm text-gray-500">Tél: +224 622 00 00 00</div>
                </div>
                
                <!-- Meta -->
                <div class="text-sm space-y-1 mb-4">
                  <div class="flex justify-between">
                    <span class="text-gray-500">Ticket N°:</span>
                    <span class="font-mono">${lastSale.receiptNumber}</span>
                  </div>
                  <div class="flex justify-between">
                    <span class="text-gray-500">Date:</span>
                    <span>${lastSale.date.toLocaleString('fr-GN')}</span>
                  </div>
                  <div class="flex justify-between">
                    <span class="text-gray-500">Caissier:</span>
                    <span>Vendeur 1</span>
                  </div>
                </div>

                <!-- Items -->
                <div class="border-t border-b py-3 mb-4">
                  <table class="w-full text-sm">
                    <thead>
                      <tr class="text-gray-500 text-xs">
                        <th class="text-left">Article</th>
                        <th class="text-center">Qté</th>
                        <th class="text-right">Total</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${lastSale.items.map(item => `
                        <tr class="border-t">
                          <td class="py-2">
                            <div class="font-medium">${item.name}</div>
                            <div class="text-xs text-gray-400">${item.barcode}</div>
                          </td>
                          <td class="text-center">${item.quantity}</td>
                          <td class="text-right">${formatCurrency(item.lineTotal, lastSale.currency)}</td>
                        </tr>
                      `).join('')}
                    </tbody>
                  </table>
                </div>

                <!-- Totals -->
                <div class="space-y-2 text-sm mb-4">
                  <div class="flex justify-between">
                    <span class="text-gray-500">Sous-total</span>
                    <span>${formatCurrency(lastSale.subtotal, lastSale.currency)}</span>
                  </div>
                  <div class="flex justify-between">
                    <span class="text-gray-500">TVA (18%)</span>
                    <span>${formatCurrency(lastSale.tax, lastSale.currency)}</span>
                  </div>
                  ${lastSale.discount > 0 ? `
                    <div class="flex justify-between text-green-600">
                      <span>Remise</span>
                      <span>-${formatCurrency(lastSale.discount, lastSale.currency)}</span>
                    </div>
                  ` : ''}
                  <div class="flex justify-between text-lg font-bold pt-2 border-t">
                    <span>TOTAL</span>
                    <span class="text-blue-600">${formatCurrency(lastSale.total, lastSale.currency)}</span>
                  </div>
                </div>

                <!-- Payment -->
                <div class="bg-green-50 rounded-lg p-3 mb-4">
                  <div class="flex items-center gap-2 font-medium text-green-700">
                    <span>${lastSale.paymentMethod === 'CASH' ? '💵' : lastSale.paymentMethod === 'MOBILE_MONEY' ? '📱' : '💳'}</span>
                    <span>${lastSale.paymentMethod === 'CASH' ? 'Espèces' : lastSale.paymentMethod === 'MOBILE_MONEY' ? 'Mobile Money' : 'Carte Bancaire'}</span>
                  </div>
                </div>

                <!-- Footer -->
                <div class="text-center text-sm text-gray-500">
                  <p>Merci de votre visite!</p>
                  <p>À bientôt 😊</p>
                  <p class="mt-2 text-xs">NIF: 000-GN-2024</p>
                </div>
              </div>
              <div class="sticky bottom-0 bg-white border-t p-3 flex gap-2">
                <button onclick="window.print()" 
                  class="flex-1 py-2 bg-blue-600 text-white rounded-lg flex items-center justify-center gap-2 hover:bg-blue-700">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
                  </svg>
                  Imprimer
                </button>
                <button onclick="showReceipt = false; render()" 
                  class="flex-1 py-2 border rounded-lg hover:bg-gray-50">
                  Fermer
                </button>
              </div>
            </div>
          </div>
        ` : ''}
      `;
    }

    // Initial render
    render();
  </script>
</body>
</html>
