name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel in-progress runs for the same PR
concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Quick PR validation
  # ─────────────────────────────────────────────────────────────────────────────
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR title format
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          echo "PR Title: $PR_TITLE"

          # Check for conventional commit format
          if [[ ! "$PR_TITLE" =~ ^(feat|fix|docs|style|refactor|test|chore|perf|ci|build|revert)(\(.+\))?\!?:\ .+ ]]; then
            echo "::warning::PR title should follow conventional commit format (e.g., 'feat: add new feature')"
          fi

      - name: Check for changelog update
        run: |
          if [ -f "CHANGELOG.md" ]; then
            if ! git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "CHANGELOG.md"; then
              echo "::warning::Consider updating CHANGELOG.md"
            fi
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Quick lint check for changed files
  # ─────────────────────────────────────────────────────────────────────────────
  quick-lint:
    name: Quick Lint
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: |
            **/*.py
            **/*.ts
            **/*.tsx
            **/*.js
            **/*.jsx
          files_ignore: |
            **/node_modules/**
            **/dist/**
            **/__pycache__/**

      - name: Set up Python
        if: contains(steps.changed-files.outputs.all_changed_files, '.py')
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python linters
        if: contains(steps.changed-files.outputs.all_changed_files, '.py')
        run: pip install ruff black isort

      - name: Run Ruff on changed Python files
        if: contains(steps.changed-files.outputs.all_changed_files, '.py')
        run: |
          python_files=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | grep '\.py$' || true)
          if [ -n "$python_files" ]; then
            echo "$python_files" | xargs ruff check --output-format=github || true
          fi

      - name: Run Black check on changed Python files
        if: contains(steps.changed-files.outputs.all_changed_files, '.py')
        run: |
          python_files=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | grep '\.py$' || true)
          if [ -n "$python_files" ]; then
            echo "$python_files" | xargs black --check --diff || true
          fi

      - name: Set up Node.js
        if: contains(steps.changed-files.outputs.all_changed_files, '.ts') || contains(steps.changed-files.outputs.all_changed_files, '.tsx')
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install ESLint
        if: contains(steps.changed-files.outputs.all_changed_files, '.ts') || contains(steps.changed-files.outputs.all_changed_files, '.tsx')
        run: npm install -g eslint

      - name: Run ESLint on changed TypeScript files
        if: contains(steps.changed-files.outputs.all_changed_files, '.ts') || contains(steps.changed-files.outputs.all_changed_files, '.tsx')
        run: |
          ts_files=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | grep -E '\.(ts|tsx)$' || true)
          if [ -n "$ts_files" ]; then
            # Find the nearest package.json for each file and run eslint
            for file in $ts_files; do
              dir=$(dirname "$file")
              while [ "$dir" != "." ] && [ ! -f "$dir/package.json" ]; do
                dir=$(dirname "$dir")
              done
              if [ -f "$dir/package.json" ]; then
                echo "Running eslint in $dir"
                cd "$dir"
                npm ci --prefer-offline --no-audit 2>/dev/null || npm install 2>/dev/null || true
                npx eslint "${file#$dir/}" --max-warnings=0 || true
                cd - > /dev/null
              fi
            done
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Quick test for changed apps only
  # ─────────────────────────────────────────────────────────────────────────────
  quick-test:
    name: Quick Test (${{ matrix.app }})
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    needs: [quick-lint]
    strategy:
      fail-fast: false
      matrix:
        app: [facturepro, savanaflow, schoolflow]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for backend changes
        id: backend-changes
        uses: tj-actions/changed-files@v42
        with:
          files: |
            apps/${{ matrix.app }}/backend/**
            shared/**

      - name: Check for frontend changes
        id: frontend-changes
        uses: tj-actions/changed-files@v42
        with:
          files: |
            apps/${{ matrix.app }}/frontend/**

      - name: Set up Python
        if: steps.backend-changes.outputs.any_changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/${{ matrix.app }}/backend/requirements.txt

      - name: Install backend dependencies
        if: steps.backend-changes.outputs.any_changed == 'true'
        working-directory: apps/${{ matrix.app }}/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        if: steps.backend-changes.outputs.any_changed == 'true'
        working-directory: apps/${{ matrix.app }}/backend
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_db
          SECRET_KEY: test_secret_key_quick_check
        run: |
          pytest tests/ -v -x --tb=short || true

      - name: Set up Node.js
        if: steps.frontend-changes.outputs.any_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/${{ matrix.app }}/frontend/package-lock.json

      - name: Install frontend dependencies
        if: steps.frontend-changes.outputs.any_changed == 'true'
        working-directory: apps/${{ matrix.app }}/frontend
        run: npm ci --prefer-offline --no-audit

      - name: Build frontend
        if: steps.frontend-changes.outputs.any_changed == 'true'
        working-directory: apps/${{ matrix.app }}/frontend
        run: npm run build

      - name: Skip if no changes
        if: steps.backend-changes.outputs.any_changed != 'true' && steps.frontend-changes.outputs.any_changed != 'true'
        run: |
          echo "No changes detected for ${{ matrix.app }}, skipping tests"

  # ─────────────────────────────────────────────────────────────────────────────
  # Bundle size check for frontend changes
  # ─────────────────────────────────────────────────────────────────────────────
  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    needs: [quick-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for frontend changes
        id: frontend-changes
        uses: tj-actions/changed-files@v42
        with:
          files: |
            apps/*/frontend/**

      - name: Set up Node.js
        if: steps.frontend-changes.outputs.any_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build and check bundle sizes
        if: steps.frontend-changes.outputs.any_changed == 'true'
        run: |
          for app in facturepro savanaflow schoolflow; do
            if [ -d "apps/$app/frontend" ]; then
              echo "=== Bundle size for $app ==="
              cd apps/$app/frontend
              npm ci --prefer-offline --no-audit 2>/dev/null || npm install
              npm run build
              if [ -d "dist" ]; then
                du -sh dist/
                du -sh dist/assets/* 2>/dev/null || true
              fi
              cd ../../..
            fi
          done

  # ─────────────────────────────────────────────────────────────────────────────
  # PR Labeler
  # ─────────────────────────────────────────────────────────────────────────────
  label-pr:
    name: Label PR
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    needs: [quick-lint]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v42

      - name: Label based on changed files
        uses: actions/github-script@v7
        with:
          script: |
            const files = '${{ steps.changed-files.outputs.all_changed_files }}'.split(' ');

            const labels = new Set();

            // Detect app changes
            if (files.some(f => f.includes('apps/facturepro'))) labels.add('facturepro');
            if (files.some(f => f.includes('apps/savanaflow'))) labels.add('savanaflow');
            if (files.some(f => f.includes('apps/schoolflow'))) labels.add('schoolflow');

            // Detect type of changes
            if (files.some(f => f.includes('/backend/'))) labels.add('backend');
            if (files.some(f => f.includes('/frontend/'))) labels.add('frontend');
            if (files.some(f => f.includes('shared/'))) labels.add('shared');
            if (files.some(f => f.includes('.github/'))) labels.add('ci-cd');
            if (files.some(f => f.includes('infra/'))) labels.add('infrastructure');
            if (files.some(f => f.includes('docs/') || f.endsWith('.md'))) labels.add('documentation');

            // Add labels
            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: Array.from(labels)
              });
            }
