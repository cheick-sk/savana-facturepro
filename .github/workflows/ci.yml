name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [facturepro, schoolflow, savanaflow]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ${{ matrix.app }}_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: apps/${{ matrix.app }}/backend
        run: pip install -r requirements.txt

      - name: Run linter
        working-directory: apps/${{ matrix.app }}/backend
        run: ruff check app/ || true

      - name: Run migrations
        working-directory: apps/${{ matrix.app }}/backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/${{ matrix.app }}_db
        run: alembic upgrade head

      - name: Run tests
        working-directory: apps/${{ matrix.app }}/backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/${{ matrix.app }}_db
          SECRET_KEY: testsecretkey1234567890abcdefghijklmno
        run: pytest tests/ -v

  build-frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [facturepro, schoolflow, savanaflow]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/${{ matrix.app }}/frontend/package.json

      - name: Install and build
        working-directory: apps/${{ matrix.app }}/frontend
        run: |
          npm install
          npm run build
