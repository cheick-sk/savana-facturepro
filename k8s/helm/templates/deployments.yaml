{{- if .Values.facturepro.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: facturepro-backend
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "saas-africa.labels" . | nindent 4 }}
    app: facturepro-backend
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.facturepro.backend.replicaCount }}
  selector:
    matchLabels:
      app: facturepro-backend
      {{- include "saas-africa.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: facturepro-backend
        {{- include "saas-africa.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "saas-africa.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: backend
        image: "{{ .Values.global.imageRegistry }}/{{ .Values.facturepro.backend.image.repository }}:{{ .Values.facturepro.backend.image.tag }}"
        imagePullPolicy: {{ .Values.facturepro.backend.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        {{- range $key, $value := .Values.facturepro.backend.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        resources:
          {{- toYaml .Values.facturepro.backend.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: facturepro-backend
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "saas-africa.labels" . | nindent 4 }}
    app: facturepro-backend
spec:
  type: {{ .Values.facturepro.backend.service.type }}
  ports:
  - port: {{ .Values.facturepro.backend.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: facturepro-backend
{{- end }}
