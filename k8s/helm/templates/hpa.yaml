{{- if and .Values.facturepro.enabled .Values.facturepro.backend.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: facturepro-backend-hpa
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "saas-africa.labels" . | nindent 4 }}
    app: facturepro-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: facturepro-backend
  minReplicas: {{ .Values.facturepro.backend.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.facturepro.backend.autoscaling.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.facturepro.backend.autoscaling.targetCPUUtilizationPercentage }}
  {{- if .Values.facturepro.backend.autoscaling.targetMemoryUtilizationPercentage }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ .Values.facturepro.backend.autoscaling.targetMemoryUtilizationPercentage }}
  {{- end }}
{{- end }}
