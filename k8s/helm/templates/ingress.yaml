{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "saas-africa.fullname" . }}-ingress
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "saas-africa.labels" . | nindent 4 }}
  annotations:
    {{- range $key, $value := .Values.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
  {{- range $host := .Values.ingress.tls.hosts }}
  - hosts:
    - {{ $host }}
    secretName: {{ $host | replace "." "-" }}-tls
  {{- end }}
  {{- end }}
  rules:
  {{- range $hostConfig := .Values.ingress.hosts }}
  - host: {{ $hostConfig.host }}
    http:
      paths:
      {{- range $path := $hostConfig.paths }}
      - path: {{ $path.path }}
        pathType: {{ $path.pathType }}
        backend:
          service:
            name: {{ $path.service }}
            port:
              number: {{ $path.port }}
      {{- end }}
  {{- end }}
{{- end }}
