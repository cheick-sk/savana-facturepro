{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "saas-africa.serviceAccountName" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "saas-africa.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "saas-africa.fullname" . }}-role
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "saas-africa.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "saas-africa.fullname" . }}-rolebinding
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "saas-africa.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "saas-africa.fullname" . }}-role
subjects:
- kind: ServiceAccount
  name: {{ include "saas-africa.serviceAccountName" . }}
  namespace: {{ .Values.namespace.name }}
{{- end }}
