# SaaS Africa Production Helm Values
# Overrides for production environment

global:
  environment: production

# FacturePro Configuration
facturepro:
  backend:
    replicaCount: 3
    image:
      tag: v2.0.0
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 15
      targetCPUUtilizationPercentage: 65
      targetMemoryUtilizationPercentage: 75
    env:
      LOG_LEVEL: "INFO"
      
  frontend:
    replicaCount: 3
    image:
      tag: v2.0.0
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 10

# SavanaFlow Configuration
savanaflow:
  backend:
    replicaCount: 2
    image:
      tag: v2.0.0
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      
  frontend:
    replicaCount: 2
    image:
      tag: v2.0.0
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8

# SchoolFlow Configuration
schoolflow:
  backend:
    replicaCount: 2
    image:
      tag: v2.0.0
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
      
  frontend:
    replicaCount: 2
    image:
      tag: v2.0.0
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 5

# Celery Workers Configuration
celery:
  worker:
    replicaCount: 3
    image:
      tag: v2.0.0
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 15
      
  beat:
    replicaCount: 1

# PostgreSQL Configuration
postgresql:
  primary:
    persistence:
      size: 100Gi
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi

# Redis Configuration
redis:
  master:
    persistence:
      size: 20Gi
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

# Ingress Configuration
ingress:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"

# Monitoring Configuration
monitoring:
  enabled: true
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 15s
      labels:
        release: prometheus
  alerting:
    enabled: true

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Priority class
priorityClassName: high-priority
