apiVersion: v1
kind: Service
metadata:
  name: facturepro-backend
  namespace: saas-africa
  labels:
    app: facturepro-backend
    app.kubernetes.io/name: facturepro-backend
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app: facturepro-backend
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP
---
