# Headless service for StatefulSet postgres
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: saas-africa
  labels:
    app: postgres
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: postgres
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
    protocol: TCP
---
