apiVersion: apps/v1
kind: Deployment
metadata:
  name: facturepro-frontend
  namespace: saas-africa
  labels:
    app: facturepro-frontend
    app.kubernetes.io/name: facturepro-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: facturepro
spec:
  replicas: 2
  selector:
    matchLabels:
      app: facturepro-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: facturepro-frontend
        app.kubernetes.io/name: facturepro-frontend
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: saas-africa-serviceaccount
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      containers:
      - name: frontend
        image: saasafrica/facturepro-frontend:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "https://api.facturepro.africa"
        - name: NEXT_PUBLIC_APP_NAME
          value: "FacturePro"
        - name: NEXT_PUBLIC_APP_ENV
          value: "production"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: facturepro-frontend
              topologyKey: kubernetes.io/hostname
