apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: saas-africa
  labels:
    app: celery-beat
    app.kubernetes.io/name: celery-beat
    app.kubernetes.io/component: scheduler
    app.kubernetes.io/part-of: saas-africa-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: celery-beat
        app.kubernetes.io/name: celery-beat
        app.kubernetes.io/component: scheduler
    spec:
      serviceAccountName: saas-africa-serviceaccount
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: celery-beat
        image: saasafrica/facturepro-backend:latest
        imagePullPolicy: Always
        command:
        - celery
        - -A
        - app.celery_app
        - beat
        - -l
        - info
        - --scheduler
        - django_celery_beat.schedulers:DatabaseScheduler
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: api-secrets
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: facturepro-database-url
        - name: CELERY_BROKER_URL
          valueFrom:
            secretKeyRef:
              name: redis-credentials
              key: celery-broker-facturepro
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pgrep -f "celery.*beat"
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: celery-beat-data
          mountPath: /app/celerybeat
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: celery-beat-data
        emptyDir: {}
---
