apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: saas-africa
  labels:
    app: postgres
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/name: postgres
        app.kubernetes.io/component: database
    spec:
      serviceAccountName: saas-africa-serviceaccount
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
      - name: postgres
        image: postgres:15-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - name: postgres
          containerPort: 5432
          protocol: TCP
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: postgres-password
        - name: POSTGRES_MULTIPLE_DATABASES
          value: "facturepro,savanaflow,schoolflow"
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        - name: POSTGRES_INITDB_ARGS
          value: "--encoding=UTF-8 --locale=C.UTF-8"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: init-scripts
          mountPath: /docker-entrypoint-initdb.d
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
      volumes:
      - name: init-scripts
        configMap:
          name: postgres-init-scripts
          optional: true
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: postgres
            topologyKey: kubernetes.io/hostname
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
      labels:
        app: postgres
        app.kubernetes.io/name: postgres-data
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: standard
      resources:
        requests:
          storage: 50Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: saas-africa
  labels:
    app: postgres
    app.kubernetes.io/name: postgres-init-scripts
data:
  init-databases.sh: |
    #!/bin/bash
    set -e
    
    # Create databases and users for each application
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      -- FacturePro database
      CREATE USER facturepro WITH PASSWORD '${FACTUREPRO_DB_PASSWORD}';
      CREATE DATABASE facturepro OWNER facturepro;
      GRANT ALL PRIVILEGES ON DATABASE facturepro TO facturepro;
      
      -- SavanaFlow database
      CREATE USER savanaflow WITH PASSWORD '${SAVANAFLOW_DB_PASSWORD}';
      CREATE DATABASE savanaflow OWNER savanaflow;
      GRANT ALL PRIVILEGES ON DATABASE savanaflow TO savanaflow;
      
      -- SchoolFlow database
      CREATE USER schoolflow WITH PASSWORD '${SCHOOLFLOW_DB_PASSWORD}';
      CREATE DATABASE schoolflow OWNER schoolflow;
      GRANT ALL PRIVILEGES ON DATABASE schoolflow TO schoolflow;
    EOSQL
