apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: saas-africa-ingress
  namespace: saas-africa
  labels:
    app.kubernetes.io/name: saas-africa-ingress
    app.kubernetes.io/component: ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-buffering: "on"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "4k"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
spec:
  tls:
  - hosts:
    - api.facturepro.africa
    - facturepro.africa
    secretName: facturepro-tls
  - hosts:
    - api.savanaflow.africa
    - savanaflow.africa
    secretName: savanaflow-tls
  - hosts:
    - api.schoolflow.africa
    - schoolflow.africa
    secretName: schoolflow-tls
  rules:
  # FacturePro API
  - host: api.facturepro.africa
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: facturepro-backend
            port:
              number: 8000
  # FacturePro Frontend
  - host: facturepro.africa
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: facturepro-frontend
            port:
              number: 80
  # SavanaFlow API
  - host: api.savanaflow.africa
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: savanaflow-backend
            port:
              number: 8000
  # SavanaFlow Frontend
  - host: savanaflow.africa
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: savanaflow-frontend
            port:
              number: 80
  # SchoolFlow API
  - host: api.schoolflow.africa
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: schoolflow-backend
            port:
              number: 8000
  # SchoolFlow Frontend
  - host: schoolflow.africa
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: schoolflow-frontend
            port:
              number: 80
---
# Certificate for Let's Encrypt
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  namespace: cert-manager
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@saas-africa.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  namespace: cert-manager
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@saas-africa.com
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
    - http01:
        ingress:
          class: nginx
