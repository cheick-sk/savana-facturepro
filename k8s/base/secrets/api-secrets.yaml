apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  namespace: saas-africa
  labels:
    app.kubernetes.io/name: api-secrets
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # JWT Secrets
  jwt-secret-key: "CHANGE_ME_JWT_SECRET_KEY_MIN_32_CHARS"
  jwt-refresh-secret-key: "CHANGE_ME_JWT_REFRESH_SECRET_KEY"
  
  # API Keys
  api-key: "CHANGE_ME_API_KEY"
  internal-api-key: "CHANGE_ME_INTERNAL_API_KEY"
  
  # Encryption Keys
  encryption-key: "CHANGE_ME_32_CHAR_ENCRYPTION_KEY"
  fernet-key: "CHANGE_ME_FERNET_KEY"
  
  # OAuth Secrets
  google-oauth-client-id: "CHANGE_ME_GOOGLE_CLIENT_ID"
  google-oauth-client-secret: "CHANGE_ME_GOOGLE_CLIENT_SECRET"
  
  # Payment Gateway Secrets
  stripe-secret-key: "CHANGE_ME_STRIPE_SECRET_KEY"
  stripe-webhook-secret: "CHANGE_ME_STRIPE_WEBHOOK_SECRET"
  paypal-client-id: "CHANGE_ME_PAYPAL_CLIENT_ID"
  paypal-client-secret: "CHANGE_ME_PAYPAL_CLIENT_SECRET"
  
  # Email Service Secrets
  sendgrid-api-key: "CHANGE_ME_SENDGRID_API_KEY"
  smtp-username: "CHANGE_ME_SMTP_USERNAME"
  smtp-password: "CHANGE_ME_SMTP_PASSWORD"
  
  # SMS Service Secrets
  twilio-account-sid: "CHANGE_ME_TWILIO_ACCOUNT_SID"
  twilio-auth-token: "CHANGE_ME_TWILIO_AUTH_TOKEN"
  
  # Storage Secrets
  aws-access-key-id: "CHANGE_ME_AWS_ACCESS_KEY"
  aws-secret-access-key: "CHANGE_ME_AWS_SECRET_KEY"
  aws-region: "af-south-1"
  s3-bucket-name: "saas-africa-storage"
  
  # Monitoring Secrets
  sentry-dsn: "CHANGE_ME_SENTRY_DSN"
  datadog-api-key: "CHANGE_ME_DATADOG_API_KEY"
  
  # Database password reference
  DB_PASSWORD: "CHANGE_ME_DB_PASSWORD"
