apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: saas-africa
  labels:
    app.kubernetes.io/name: db-credentials
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # PostgreSQL root password
  postgres-password: "CHANGE_ME_POSTGRES_ROOT_PASSWORD"
  
  # FacturePro database credentials
  facturepro-db-user: "facturepro"
  facturepro-db-password: "CHANGE_ME_FACTUREPRO_DB_PASSWORD"
  facturepro-db-name: "facturepro"
  
  # SavanaFlow database credentials
  savanaflow-db-user: "savanaflow"
  savanaflow-db-password: "CHANGE_ME_SAVANAFLOW_DB_PASSWORD"
  savanaflow-db-name: "savanaflow"
  
  # SchoolFlow database credentials
  schoolflow-db-user: "schoolflow"
  schoolflow-db-password: "CHANGE_ME_SCHOOLFLOW_DB_PASSWORD"
  schoolflow-db-name: "schoolflow"
  
  # Connection strings (templates - actual values should be generated)
  facturepro-database-url: "postgresql://facturepro:CHANGE_ME_FACTUREPRO_DB_PASSWORD@postgres-facturepro:5432/facturepro"
  savanaflow-database-url: "postgresql://savanaflow:CHANGE_ME_SAVANAFLOW_DB_PASSWORD@postgres-savanaflow:5432/savanaflow"
  schoolflow-database-url: "postgresql://schoolflow:CHANGE_ME_SCHOOLFLOW_DB_PASSWORD@postgres-schoolflow:5432/schoolflow"
