apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: saas-africa
  labels:
    app.kubernetes.io/name: redis-credentials
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Redis password
  redis-password: "CHANGE_ME_REDIS_PASSWORD"
  
  # Redis URLs with authentication
  redis-url: "redis://:CHANGE_ME_REDIS_PASSWORD@redis:6379/0"
  redis-url-facturepro: "redis://:CHANGE_ME_REDIS_PASSWORD@redis:6379/0"
  redis-url-savanaflow: "redis://:CHANGE_ME_REDIS_PASSWORD@redis:6379/2"
  redis-url-schoolflow: "redis://:CHANGE_ME_REDIS_PASSWORD@redis:6379/4"
  
  # Celery broker URLs
  celery-broker-facturepro: "redis://:CHANGE_ME_REDIS_PASSWORD@redis:6379/1"
  celery-broker-savanaflow: "redis://:CHANGE_ME_REDIS_PASSWORD@redis:6379/3"
  celery-broker-schoolflow: "redis://:CHANGE_ME_REDIS_PASSWORD@redis:6379/5"
