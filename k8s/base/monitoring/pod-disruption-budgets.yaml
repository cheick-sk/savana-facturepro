apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: facturepro-backend-pdb
  namespace: saas-africa
  labels:
    app.kubernetes.io/name: facturepro-backend-pdb
    app.kubernetes.io/component: policy
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: facturepro-backend
