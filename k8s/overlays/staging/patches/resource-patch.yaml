apiVersion: apps/v1
kind: Deployment
metadata:
  name: facturepro-backend
spec:
  template:
    spec:
      containers:
      - name: backend
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "250m"
